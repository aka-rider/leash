version: 2

project_name: leash

builds:
  - id: leash
    main: ./cmd/leash/
    binary: leash
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -trimpath -s -w -X main.version={{.Version}}

  - id: leash-trace
    main: ./cmd/trace/
    binary: leash-trace
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -trimpath -s -w -X main.version={{.Version}}

universal_binaries:
  - id: leash-universal
    ids:
      - leash
    replace: true

  - id: leash-trace-universal
    ids:
      - leash-trace
    replace: true

archives:
  - id: leash
    ids:
      - leash-universal
      - leash-trace-universal
    name_template: "leash_{{.Version}}_darwin_universal"
    format: tar.gz
    files:
      - leash.example.yaml

brews:
  - name: leash
    ids:
      - leash
    repository:
      owner: aka-rider
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    description: "Transparent macOS seatbelt sandbox for any command"
    homepage: "https://github.com/aka-rider/leash"
    license: MIT
    install: |
      bin.install "leash"
      bin.install "leash-trace"
    test: |
      system "#{bin}/leash", "--help"
